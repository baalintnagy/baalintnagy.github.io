<head>
    <title>Bálint Nagy CV</title>

    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <!-- Modern CV Styles -->
    <link rel="stylesheet" href="assets/css/modern-cv.css">
    <link rel="stylesheet" href="assets/css/theme-switcher.css">
</head>
<body>
    <!-- PDF Export Button -->
    <button id="export-long-pdf-btn" type="button" class="pdf-export-btn">Export PDF</button>
    
    <div id="cv-app">
        <div class="loading">
            <i class="bi bi-hourglass-split"></i>
            <p>Loading CV...</p>
        </div>
    </div>

    <!-- Template Engine -->
    <script src="assets/js/template-engine.js"></script>
    
    <!-- PDF Export Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    
    <!-- Theme Switcher -->
    <script src="assets/js/theme-switcher.js"></script>

    <!-- Auxiliary scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.4/latest.js?config=AM_CHTML"></script>
    <script src="assets/js/script.js"></script>
    
    <!-- CV Application -->
    <script>
        async function load_CV_JSON_Data(filePath) {
            try {
                const response = await fetch(filePath);
                if (!response.ok) {
                    throw new Error(`Failed to load CV data: ${response.status} ${response.statusText}`);
                }
                return await response.json();
            } catch (error) {
                console.error('Error loading CV data:', error);
                throw error;
            }
        }

        // Fallback CV data for when fetch fails - generic template filler
        const fallbackCVData = {
            "meta": {
                "source": {
                    "type": "html",
                    "title": "John Doe CV"
                }
            },
            "basics": {
                "name": "John Doe",
                "label": "Senior Janitor Intern",
                "image": "https://upload.wikimedia.org/wikipedia/commons/thumb/2/28/Albert_Einstein_Head_cleaned.jpg/500px-Albert_Einstein_Head_cleaned.jpg?20251103195240",
                "website": "https://acme.acme",
                "email": "johnny1988@acme.acme",
                "phone": "+36 20 123 4567",
                "profiles": [
                    {
                        "network": "LinkedIn",
                        "url": "https://www.linkedin.com/in/404"
                    },
                    {
                        "network": "GitHub",
                        "url": "https://github.com/404"
                    },
                    {
                        "network": "GitLab",
                        "url": "https://gitlab.com/404"
                    }
                ]
            },
            "summary": [
                "Lorem ipsum dolor sit amet, consectetur adipiscing elit. Integer vel augue nec justo facilisis tristique. Sed non sem at sapien suscipit ullamcorper. Cras non purus vitae lacus pulvinar varius. Vestibulum ante ipsum primis in faucibus orci luctus et ultrices posuere cubilia curae; Suspendisse potenti. Nulla facilisi. Donec sed nisl eu libero aliquet gravida. Mauris in mi non ipsum sagittis laoreet. Proin a sem nec tortor hendrerit fermentum. Curabitur at lacus non nulla commodo tincidunt. Aliquam erat volutpat."
            ],
            "work": [
                {
                    "company": "Tech Company",
                    "position": "Janitor",
                    "start": "2020",
                    "end": "Present",
                    "highlights": [
                        "Phasellus vitae nunc at arcu luctus dignissim. Praesent ut dui nec erat cursus bibendum. Nam feugiat, lectus et aliquet luctus, justo lorem pharetra purus, vitae tincidunt justo nibh eget neque. Integer dictum urna sed sapien hendrerit, a interdum velit dictum. Morbi et urna ut libero luctus tristique. Aenean finibus, erat vitae dapibus fermentum, neque odio efficitur lorem, non hendrerit risus arcu sit amet erat. Pellentesque habitant morbi tristique senectus et netus et malesuada fames ac turpis egestas."
                    ],
                    "technologies": ["Mop", "Bucket", "Broom"]
                }
            ],
            "skills": {
                "technical": [
                    {
                        "group": "Janitor utilities",
                        "items": [
                            {"name": "Mop", "proficiencyPercent": 85},
                            {"name": "Bucket", "proficiencyPercent": 70},
                            {"name": "Broom", "proficiencyPercent": 75}
                        ]
                    },
                    {
                        "group": "Auxiliari facilities",
                        "items": [
                            {"name": "Vacuum cleaner", "proficiencyPercent": 15},
                            {"name": "Sponges", "proficiencyPercent": 30},
                            {"name": "Dustpan", "proficiencyPercent": 65}
                        ]
                    }
                ],
                "soft": [
                    "Problem Solving",
                    "Teamwork",
                    "Communication",
                    "Adaptability"
                ]
            },
            "education": [
                {
                    "institution": "University of Life",
                    "area": "Janitor course",
                    "studyType": "PhD",
                    "start": "2010",
                    "end": "2020"
                }
            ],
            "languages": [
                {
                    "language": "Irish [drunken]",
                    "fluency": "native",
                    "percentage": 65
                },
                {
                    "language": "English",
                    "fluency": "intermediate",
                    "percentage": 40
                }
            ],
            "extras": {
                "footerLink": {
                    "label": "https://acme.acme",
                    "url": "https://acme.acme"
                }
            }
        };

        class CVApplication {
            constructor() {
                this.templateEngine = new CVTemplateEngine();
                this.cvData = null;
                this.init();
            }

            async init() {
                try {
                    await this.loadCVData();
                    this.renderCV();
                    this.hideLoading();
                } catch (error) {
                    this.showError(error);
                }
            }

            async loadCVData() {
                // Load CV data using the fetch-based function
                try {
                    this.cvData = await load_CV_JSON_Data('/data/cv.json');
                    console.log('Loaded CV data from file');
                } catch (error) {
                    console.log('Could not load from file, using fallback data');
                    // Fallback to embedded data if fetch fails
                    this.cvData = fallbackCVData;
                }
            }

            renderCV() {
                const container = document.getElementById('cv-app');
                this.templateEngine.render(this.cvData, container);
                
                // Add some animation to skill bars
                this.animateSkillBars();
                
                // Setup profile picture switching
                this.setupProfilePictureSwitch();
            }

            animateSkillBars() {
                const skillBars = document.querySelectorAll('.skill-progress');
                const observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            const width = entry.target.style.width;
                            entry.target.style.width = '0%';
                            setTimeout(() => {
                                entry.target.style.width = width;
                            }, 100);
                            observer.unobserve(entry.target);
                        }
                    });
                });

                skillBars.forEach(bar => observer.observe(bar));
            }

            setupProfilePictureSwitch() {
                const profileImage = document.querySelector('.profile-image');
                if (!profileImage) return;

                const images = ['assets/images/profile.png', 'assets/images/profile.jpeg'];
                let currentIndex = 0;

                profileImage.style.cursor = 'pointer';
                profileImage.title = 'Click to switch profile picture';

                profileImage.addEventListener('click', () => {
                    currentIndex = (currentIndex + 1) % images.length;
                    profileImage.style.opacity = '0';
                    
                    setTimeout(() => {
                        profileImage.src = images[currentIndex];
                        profileImage.style.opacity = '1';
                    }, 150);
                });
            }

            hideLoading() {
                const loading = document.querySelector('.loading');
                if (loading) {
                    loading.style.display = 'none';
                }
            }

            showError(error) {
                const container = document.getElementById('cv-app');
                container.innerHTML = `
                    <div class="error">
                        <i class="bi bi-exclamation-triangle"></i>
                        <h2>Error Loading CV</h2>
                        <p>${error.message}</p>
                        <button onclick="location.reload()">Try Again</button>
                    </div>
                `;
            }
        }

        // Initialize the application when DOM is ready
        document.addEventListener('DOMContentLoaded', () => {
            new CVApplication();
            
            // Setup PDF export
            const exportBtn = document.getElementById('export-long-pdf-btn');
            if (exportBtn) {
                exportBtn.addEventListener('click', exportLongPdf);
            }
        });

        // PDF Export Function
        async function exportLongPdf() {
            const cvElement = document.querySelector('.cv-container');
            if (!cvElement) {
                alert('CV container not found.');
                return;
            }

            const button = document.getElementById('export-long-pdf-btn');
            if (button) {
                button.disabled = true;
                button.textContent = 'Exporting...';
            }

            try {
                // Optional: add an export-only class to tweak styles if needed
                document.body.classList.add('pdf-export-mode');

                // Wait a frame so styles settle
                await new Promise(resolve => requestAnimationFrame(resolve));

                const canvas = await html2canvas(cvElement, {
                    backgroundColor: '#ffffff',
                    scale: 2,          // better sharpness
                    useCORS: true,     // useful if image/font hosting allows it
                    logging: false
                });

                const imgData = canvas.toDataURL('image/png');

                const { PDFDocument } = PDFLib;
                const pdfDoc = await PDFDocument.create();

                const pngImage = await pdfDoc.embedPng(imgData);

                // PDF uses points. 1 px at 96dpi = 0.75 pt
                const PX_TO_PT = 0.75;

                const pageWidth = canvas.width * PX_TO_PT;
                const pageHeight = canvas.height * PX_TO_PT;

                const page = pdfDoc.addPage([pageWidth, pageHeight]);

                page.drawImage(pngImage, {
                    x: 0,
                    y: 0,
                    width: pageWidth,
                    height: pageHeight
                });

                const pdfBytes = await pdfDoc.save();

                const blob = new Blob([pdfBytes], { type: 'application/pdf' });
                const url = URL.createObjectURL(blob);

                const a = document.createElement('a');
                a.href = url;
                a.download = 'Balint-Nagy-CV.pdf';
                document.body.appendChild(a);
                a.click();
                a.remove();

                URL.revokeObjectURL(url);
            } catch (err) {
                console.error('PDF export failed:', err);
                alert('PDF export failed. Check console for details.');
            } finally {
                document.body.classList.remove('pdf-export-mode');

                if (button) {
                    button.disabled = false;
                    button.textContent = 'Export PDF';
                }
            }
        }
    </script>

    <style>
        .loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: var(--text-secondary);
        }

        .loading i {
            font-size: 3rem;
            margin-bottom: 1rem;
            animation: spin 2s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .error {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            color: var(--text-secondary);
        }

        .error i {
            font-size: 3rem;
            color: #dc3545;
            margin-bottom: 1rem;
        }

        .error h2 {
            color: var(--text-primary);
            margin-bottom: 1rem;
        }

        .error button {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: var(--border-radius);
            cursor: pointer;
            font-weight: 500;
            transition: background-color 0.2s;
        }

        .error button:hover {
            background: #1e40af;
        }

        .profile-image {
            transition: opacity 0.15s ease-in-out;
        }

        /* PDF Export Button */
        .pdf-export-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 1000;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 50px;
            padding: 12px 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            font-weight: 500;
            box-shadow: var(--shadow-lg);
            transition: all 0.3s ease;
        }

        .pdf-export-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 20px -5px rgb(0 0 0 / 0.2);
        }

        .pdf-export-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* PDF Export Mode Styles */
        body.pdf-export-mode .cv-container {
            box-shadow: none !important;
        }

        body.pdf-export-mode a {
            text-decoration: none;
            color: inherit;
        }

        body.pdf-export-mode * {
            animation: none !important;
            transition: none !important;
        }

        /* Responsive adjustments for PDF export button */
        @media (max-width: 768px) {
            .pdf-export-btn {
                top: 15px;
                left: 15px;
                padding: 10px 16px;
                font-size: 12px;
            }
        }

        @media (max-width: 480px) {
            .pdf-export-btn {
                top: 10px;
                left: 10px;
                padding: 8px 12px;
                font-size: 11px;
            }
        }
    </style>
</body>
</html>
